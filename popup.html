<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Open Site</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title-row">
                <h1>Quick Open Site</h1>
                <div class="header-actions">
                    <button id="dashboardBtn" class="header-icon-btn" title="快捷键总览">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="7"/>
                            <rect x="14" y="3" width="7" height="7"/>
                            <rect x="3" y="14" width="7" height="7"/>
                            <rect x="14" y="14" width="7" height="7"/>
                        </svg>
                    </button>
                    <button id="settingsBtn" class="header-icon-btn" title="打开设置">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="搜索书签、文件夹或按快捷键...">
                <div class="search-icon">🔍</div>
                <div id="clearSearchBtn" class="clear-search-btn" style="display: none;">✕</div>
            </div>
        </div>

        <div class="content">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <span>正在加载书签...</span>
            </div>

            <div id="bookmarksList" class="bookmarks-list" style="display: none;">
                <!-- 动态生成书签列表 -->
            </div>

            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-icon">📁</div>
                <h3>未找到书签</h3>
                <p>您可以在设置中配置要搜索的一级书签文件夹。</p>
                <p>如果配置了文件夹名称，请确保该文件夹存在。</p>
                <p>书签名称格式：网站名称 [快捷键]</p>
                <p>例如：Google [g]、GitHub [h]</p>
            </div>

            <div id="noResults" class="empty-state" style="display: none;">
                <div class="empty-icon">🔍</div>
                <h3>未找到匹配的书签</h3>
                <p>请尝试其他搜索词或检查书签设置。</p>
                <p>提示：您可以搜索书签名称、网址或文件夹名称。</p>
            </div>
        </div>

        <div class="footer">
            <div class="tips">
                <span>提示：按 a-z 或 0-9 快速打开书签</span>
            </div>
            <div class="add-bookmark-form">
                <div id="availableKeysPopover" class="popover" style="display: none;">
                    <div class="popover-header">可用快捷键</div>
                    <div id="popoverContent" class="popover-content"></div>
                </div>
                <input type="text" id="addKeyInput" placeholder="快捷键" maxlength="1">
                <button id="addBookmarkBtn">添加当前页面</button>
            </div>
        </div>
    </div>

    <!-- 自定义 Tooltip -->
    <div id="customTooltip" class="custom-tooltip" style="display: none;"></div>

    <script src="shared.js"></script>
    <script src="popup.js"></script>
</body>
</html>
