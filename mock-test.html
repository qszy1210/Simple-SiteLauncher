<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Test - Popup & Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }
        .test-container {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            max-width: 1400px;
            margin: 0 auto;
        }
        .test-section {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .test-label {
            background: #1E293B;
            color: white;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
        }
        .popup-frame { width: 420px; }
        .dashboard-frame { flex: 1; min-width: 600px; }

        /* === POPUP STYLES === */
        #popupMock .p-header {
            padding: 20px;
            background: linear-gradient(135deg, #2563EB 0%, #3B82F6 100%);
            color: white;
        }
        #popupMock .p-header h1 { font-size: 18px; font-weight: 700; }
        #popupMock .p-content { padding: 16px; background: rgba(248,250,252,0.5); }
        #popupMock .p-list { display: flex; flex-direction: column; gap: 6px; }
        #popupMock .p-item {
            display: flex; align-items: center; padding: 8px 12px;
            background: rgba(255,255,255,0.9); border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05); cursor: pointer;
            border-left: 3px solid transparent; transition: all 0.2s ease;
        }
        #popupMock .p-item:hover {
            border-left-color: #3B82F6;
            box-shadow: 0 4px 16px rgba(37,99,235,0.15);
        }
        #popupMock .p-icon {
            width: 24px; height: 24px; border-radius: 6px;
            background: linear-gradient(135deg, #2563EB 0%, #3B82F6 100%);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 11px;
            margin-right: 10px; flex-shrink: 0;
        }
        #popupMock .p-info { flex: 1; overflow: hidden; }
        #popupMock .p-title {
            font-weight: 600; font-size: 13px; color: #1E293B;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        #popupMock .p-url {
            font-size: 11px; color: #64748B; opacity: 0.6;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        #popupMock .p-key {
            background: rgba(37,99,235,0.1); color: #2563EB;
            padding: 3px 6px; border-radius: 4px;
            font-size: 11px; font-weight: 700; margin-left: 6px;
        }

        /* === DASHBOARD STYLES === */
        #dashMock .d-header {
            background: linear-gradient(135deg, #2563EB 0%, #3B82F6 100%);
            color: white; padding: 18px 24px;
            display: flex; align-items: center; justify-content: space-between;
        }
        #dashMock .d-header h1 { font-size: 20px; font-weight: 700; }
        #dashMock .d-content { padding: 20px 24px; }
        #dashMock .d-stats { display: flex; gap: 10px; margin-bottom: 20px; }
        #dashMock .d-stat {
            flex: 1; background: #fff; border-radius: 10px;
            padding: 10px 14px; text-align: center;
            border: 1px solid rgba(226,232,240,0.8);
        }
        #dashMock .d-stat-val { font-size: 22px; font-weight: 700; color: #2563EB; }
        #dashMock .d-stat-lbl { font-size: 11px; color: #64748B; margin-top: 2px; }
        #dashMock .d-section { margin-bottom: 20px; }
        #dashMock .d-sec-title {
            font-size: 15px; font-weight: 600; color: #1E293B;
            margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
        }
        #dashMock .d-sec-title::before {
            content: ''; width: 3px; height: 16px;
            background: linear-gradient(135deg, #2563EB 0%, #3B82F6 100%);
            border-radius: 2px;
        }
        #dashMock .d-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 8px;
        }
        #dashMock .d-card {
            background: rgba(255,255,255,0.95); border-radius: 10px;
            padding: 10px 12px; border: 1px solid rgba(226,232,240,0.8);
            transition: all 0.2s ease; position: relative;
        }
        #dashMock .d-card:hover {
            box-shadow: 0 4px 12px rgba(37,99,235,0.1);
            border-color: rgba(37,99,235,0.3);
        }
        #dashMock .d-card.empty { border-style: dashed; background: rgba(248,250,252,0.5); }
        #dashMock .d-card-hd {
            display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 4px;
        }
        #dashMock .d-badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 28px; height: 28px; border-radius: 6px;
            font-size: 13px; font-weight: 700; text-transform: uppercase;
        }
        #dashMock .d-card:not(.empty) .d-badge {
            background: linear-gradient(135deg, #2563EB 0%, #3B82F6 100%);
            color: white;
        }
        #dashMock .d-card.empty .d-badge {
            background: rgba(148,163,184,0.12); color: #94A3B8;
        }
        #dashMock .d-add-btn {
            width: 24px; height: 24px; border-radius: 6px;
            border: 1.5px dashed rgba(37,99,235,0.3);
            background: transparent; color: #2563EB;
            font-size: 16px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease; opacity: 0; line-height: 1;
        }
        #dashMock .d-card:hover .d-add-btn { opacity: 1; }
        #dashMock .d-add-btn:hover { background: rgba(37,99,235,0.08); border-color: #2563EB; }
        #dashMock .d-bm {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 0; border-top: 1px solid rgba(226,232,240,0.5);
            cursor: pointer;
        }
        #dashMock .d-bm:first-of-type { margin-top: 2px; }
        #dashMock .d-fav {
            width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0;
            background: linear-gradient(135deg, #2563EB 0%, #3B82F6 100%);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 9px; font-weight: bold;
        }
        #dashMock .d-bm-info { flex: 1; min-width: 0; }
        #dashMock .d-bm-title {
            font-size: 12px; font-weight: 600; color: #1E293B;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3;
        }
        #dashMock .d-bm-url {
            font-size: 10px; color: #94A3B8;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2;
        }
        #dashMock .d-bm-acts {
            display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s ease; flex-shrink: 0;
        }
        #dashMock .d-bm:hover .d-bm-acts { opacity: 1; }
        #dashMock .d-act-btn {
            background: transparent; border: none; border-radius: 4px;
            width: 22px; height: 22px; font-size: 11px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: #94A3B8; transition: all 0.15s ease;
        }
        #dashMock .d-act-btn:hover { background: rgba(37,99,235,0.1); color: #2563EB; }
        #dashMock .d-empty-hint { text-align: center; color: #94A3B8; font-size: 11px; padding: 4px 0; }

        /* tooltip */
        .mock-tip {
            position: fixed;
            background: rgba(15,23,42,0.95);
            color: white; padding: 6px 10px; border-radius: 6px;
            font-size: 12px; line-height: 1.4; max-width: 320px;
            word-wrap: break-word; z-index: 10000; pointer-events: none;
            opacity: 0; transition: opacity 0.12s ease;
            box-shadow: 0 4px 14px rgba(15,23,42,0.35);
        }
        .mock-tip.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="test-container">
        <div class="test-section popup-frame">
            <div class="test-label">Popup: 只显示 displayTitle, 完整路径在 tooltip</div>
            <div id="popupMock"></div>
        </div>
        <div class="test-section dashboard-frame">
            <div class="test-label">Dashboard: 紧凑布局 + 快速 tooltip + 添加按钮(+)</div>
            <div id="dashMock"></div>
        </div>
    </div>
    <div id="mockTip" class="mock-tip" style="display:none;"></div>

    <script>
        const MOCK = [
            { dt: 'Google', url: 'https://www.google.com', key: 'g', folder: '常用网站' },
            { dt: 'GitHub', url: 'https://github.com', key: 'h', folder: '开发工具' },
            { dt: 'Stack Overflow', url: 'https://stackoverflow.com', key: 's', folder: '开发工具' },
            { dt: 'YouTube', url: 'https://www.youtube.com', key: 'y', folder: '视频娱乐' },
            { dt: 'MDN Web Docs', url: 'https://developer.mozilla.org', key: 'm', folder: '开发文档' },
            { dt: 'ChatGPT', url: 'https://chat.openai.com', key: 'c', folder: 'AI 工具' },
            { dt: 'Claude', url: 'https://claude.ai', key: 'l', folder: 'AI 工具' },
            { dt: 'Figma', url: 'https://www.figma.com', key: 'f', folder: '设计工具' },
            { dt: '掘金', url: 'https://juejin.cn', key: 'j', folder: '技术社区' },
            { dt: 'Vercel Dashboard', url: 'https://vercel.com/dashboard', key: 'v', folder: '部署平台' },
            { dt: 'Twitter / X', url: 'https://x.com', key: 'x', folder: '社交媒体' },
            { dt: 'Notion 笔记工作台', url: 'https://www.notion.so', key: 'n', folder: '效率工具' },
            { dt: 'Bilibili 哔哩哔哩弹幕网', url: 'https://www.bilibili.com', key: 'b', folder: '视频娱乐' },
            { dt: 'Zhihu 知乎问答社区', url: 'https://www.zhihu.com', key: 'z', folder: '知识社区' },
            { dt: 'V2EX 创意工作者社区', url: 'https://v2ex.com', key: '2', folder: '技术社区' },
            { dt: 'npm Registry', url: 'https://www.npmjs.com', folder: '开发工具' },
            { dt: 'Docker Hub', url: 'https://hub.docker.com', folder: '开发工具' },
            { dt: 'LeetCode 力扣', url: 'https://leetcode.cn', folder: '学习' },
            { dt: 'Wikipedia 维基百科', url: 'https://zh.wikipedia.org', folder: '知识社区' },
        ];

        const tipEl = document.getElementById('mockTip');
        function setupTip(el, text) {
            let t = null;
            el.addEventListener('mouseenter', () => {
                t = setTimeout(() => {
                    if (el.scrollWidth > el.clientWidth) {
                        tipEl.textContent = text;
                        tipEl.style.display = 'block';
                        const r = el.getBoundingClientRect();
                        const tw = tipEl.offsetWidth || 300;
                        let left = r.left + r.width / 2 - tw / 2;
                        if (left < 8) left = 8;
                        if (left + tw > window.innerWidth - 8) left = window.innerWidth - tw - 8;
                        let top = r.top - (tipEl.offsetHeight || 30) - 10;
                        if (top < 8) top = r.bottom + 10;
                        tipEl.style.left = left + 'px';
                        tipEl.style.top = top + 'px';
                        requestAnimationFrame(() => tipEl.classList.add('show'));
                    }
                }, 50);
            });
            el.addEventListener('mouseleave', () => {
                clearTimeout(t);
                tipEl.classList.remove('show');
                setTimeout(() => { if (!tipEl.classList.contains('show')) tipEl.style.display = 'none'; }, 100);
            });
        }

        function hostname(url) { try { return new URL(url).hostname; } catch { return url; } }

        // --- Popup ---
        (function renderPopup() {
            const root = document.getElementById('popupMock');
            const hdr = document.createElement('div');
            hdr.className = 'p-header';
            const h1 = document.createElement('h1');
            h1.textContent = 'Quick Open Site';
            hdr.appendChild(h1);
            root.appendChild(hdr);

            const content = document.createElement('div');
            content.className = 'p-content';
            const list = document.createElement('div');
            list.className = 'p-list';

            MOCK.forEach(bm => {
                const item = document.createElement('div');
                item.className = 'p-item';

                const icon = document.createElement('div');
                icon.className = 'p-icon';
                icon.textContent = bm.dt.charAt(0);

                const info = document.createElement('div');
                info.className = 'p-info';
                const title = document.createElement('div');
                title.className = 'p-title';
                title.textContent = bm.dt;
                const fp = bm.folder ? bm.folder + ' \u203A ' + bm.dt : bm.dt;
                setupTip(title, fp);
                const url = document.createElement('div');
                url.className = 'p-url';
                url.textContent = hostname(bm.url);
                setupTip(url, bm.url);
                info.appendChild(title);
                info.appendChild(url);

                item.appendChild(icon);
                item.appendChild(info);

                if (bm.key) {
                    const badge = document.createElement('span');
                    badge.className = 'p-key';
                    badge.textContent = bm.key.toUpperCase();
                    item.appendChild(badge);
                }

                list.appendChild(item);
            });

            content.appendChild(list);
            root.appendChild(content);
        })();

        // --- Dashboard ---
        (function renderDash() {
            const root = document.getElementById('dashMock');
            const hdr = document.createElement('div');
            hdr.className = 'd-header';
            const h1 = document.createElement('h1');
            h1.textContent = '\u5FEB\u6377\u952E\u603B\u89C8';
            hdr.appendChild(h1);
            root.appendChild(hdr);

            const content = document.createElement('div');
            content.className = 'd-content';

            const keyMap = new Map();
            MOCK.filter(b => b.key).forEach(b => {
                if (!keyMap.has(b.key)) keyMap.set(b.key, []);
                keyMap.get(b.key).push(b);
            });

            // Stats
            const statsBar = document.createElement('div');
            statsBar.className = 'd-stats';
            const boundCount = keyMap.size;
            [
                { v: boundCount, l: '\u5DF2\u7ED1\u5B9A' },
                { v: 36 - boundCount, l: '\u53EF\u7528' },
                { v: MOCK.length, l: '\u603B\u4E66\u7B7E' },
                { v: MOCK.filter(b => !b.key).length, l: '\u672A\u7ED1\u5B9A' },
            ].forEach(s => {
                const card = document.createElement('div');
                card.className = 'd-stat';
                const val = document.createElement('div');
                val.className = 'd-stat-val';
                val.textContent = s.v;
                const lbl = document.createElement('div');
                lbl.className = 'd-stat-lbl';
                lbl.textContent = s.l;
                card.appendChild(val);
                card.appendChild(lbl);
                statsBar.appendChild(card);
            });
            content.appendChild(statsBar);

            function createGrid(title, keys) {
                const section = document.createElement('div');
                section.className = 'd-section';
                const h2 = document.createElement('h2');
                h2.className = 'd-sec-title';
                h2.textContent = title;
                section.appendChild(h2);

                const grid = document.createElement('div');
                grid.className = 'd-grid';

                keys.forEach(k => {
                    const bms = keyMap.get(k) || [];
                    const card = document.createElement('div');
                    card.className = 'd-card' + (bms.length === 0 ? ' empty' : '');

                    const header = document.createElement('div');
                    header.className = 'd-card-hd';
                    const badge = document.createElement('div');
                    badge.className = 'd-badge';
                    badge.textContent = k.toUpperCase();
                    header.appendChild(badge);
                    const addBtn = document.createElement('button');
                    addBtn.className = 'd-add-btn';
                    addBtn.textContent = '+';
                    header.appendChild(addBtn);
                    card.appendChild(header);

                    if (bms.length > 0) {
                        bms.forEach(bm => {
                            const row = document.createElement('div');
                            row.className = 'd-bm';

                            const fav = document.createElement('div');
                            fav.className = 'd-fav';
                            fav.textContent = bm.dt.charAt(0);

                            const info = document.createElement('div');
                            info.className = 'd-bm-info';
                            const t = document.createElement('div');
                            t.className = 'd-bm-title';
                            t.textContent = bm.dt;
                            const fp = bm.folder ? bm.folder + ' \u203A ' + bm.dt : bm.dt;
                            setupTip(t, fp);
                            const u = document.createElement('div');
                            u.className = 'd-bm-url';
                            u.textContent = hostname(bm.url);
                            setupTip(u, bm.url);
                            info.appendChild(t);
                            info.appendChild(u);

                            const acts = document.createElement('div');
                            acts.className = 'd-bm-acts';
                            ['\u270F\uFE0F', '\u232B', '\uD83D\uDDD1\uFE0F'].forEach(ico => {
                                const btn = document.createElement('button');
                                btn.className = 'd-act-btn';
                                btn.textContent = ico;
                                acts.appendChild(btn);
                            });

                            row.appendChild(fav);
                            row.appendChild(info);
                            row.appendChild(acts);
                            card.appendChild(row);
                        });
                    } else {
                        const hint = document.createElement('div');
                        hint.className = 'd-empty-hint';
                        hint.textContent = '\u672A\u7ED1\u5B9A';
                        card.appendChild(hint);
                    }

                    grid.appendChild(card);
                });

                section.appendChild(grid);
                return section;
            }

            content.appendChild(createGrid('\u5B57\u6BCD\u5FEB\u6377\u952E (A-Z)', 'abcdefghijklmnopqrstuvwxyz'.split('')));
            content.appendChild(createGrid('\u6570\u5B57\u5FEB\u6377\u952E (0-9)', '0123456789'.split('')));
            root.appendChild(content);
        })();
    </script>
</body>
</html>
